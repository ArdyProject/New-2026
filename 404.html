    <!-- Environment -->

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Init AOS (jika ingin dipakai, tapi sudah pakai CSS keyframes)
        AOS.init();

        // Custom Cursor
        if(window.innerWidth > 768) {
            const cursorDot = document.querySelector('.cursor-dot'), cursorOutline = document.querySelector('.cursor-outline');
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX, posY = e.clientY;
                cursorDot.style.left = `${posX}px`; cursorDot.style.top = `${posY}px`;
                cursorOutline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 100, fill: "forwards" });
            });
        }

        // Particle Background (Sama dengan index, menjaga konsistensi)
        const canvas = document.getElementById('canvas-particles'), ctx = canvas.getContext('2d');
        let width, height, particles;
        function initParticles() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; particles = [];
            for(let i = 0; i < (window.innerWidth < 768 ? 20 : 50); i++) {
                particles.push({ x: Math.random() * width, y: Math.random() * height, r: Math.random() * 1.5, dx: (Math.random() - 0.5) * 0.4, dy: (Math.random() - 0.5) * 0.4 });
            }
        }
        function drawParticles() {
            ctx.clearRect(0, 0, width, height); ctx.fillStyle = '#ffffff';
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if(p.x < 0) p.x = width; if(p.x > width) p.x = 0; if(p.y < 0) p.y = height; if(p.y > height) p.y = 0;
            });
            requestAnimationFrame(drawParticles);
        }
        initParticles(); drawParticles(); window.addEventListener('resize', initParticles);

        // Typing Effect untuk Pesan Error
        const textToType = "Sistem gagal melacak koordinat file yang Anda tuju. Halaman mungkin telah dihapus, pindah server, atau Anda salah memasukkan endpoint API.";
        const typeContainer = document.getElementById('typewriter-text');
        let charIndex = 0;

        function typeErrorMsg() {
            if (charIndex < textToType.length) {
                // Tambahkan karakter satu per satu
                typeContainer.innerHTML = textToType.substring(0, charIndex + 1) + '<span class="cursor-blink">_</span>';
                charIndex++;
                // Kecepatan ketik acak biar kaya ngetik beneran
                setTimeout(typeErrorMsg, Math.random() * 30 + 20); 
            } else {
                // Kalau selesai, sisakan cursor berkedip
                typeContainer.innerHTML = textToType + '<span class="cursor-blink">_</span>';
            }
        }
        
        // Mulai ngetik setelah delay dikit
        setTimeout(typeErrorMsg, 800);

        // Fake Coordinates Updater (Buat dekorasi di pojok kiri bawah)
        const coordsElement = document.getElementById('live-coords');
        if(coordsElement) {
            setInterval(() => {
                const x = (Math.random() * 1000).toFixed(3);
                const y = (Math.random() * 1000).toFixed(3);
                coordsElement.innerHTML = `SYS_COORD: ${x}, ${y}<br>STATUS: OFFLINE_MODE`;
            }, 2000);
        }
    </script>
</body>
